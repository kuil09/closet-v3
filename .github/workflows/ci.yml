name: CI

on:
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

      - name: Build app
        run: bun run build

      - name: Install Chromium
        run: bunx playwright install --with-deps chromium

      - name: Start preview server
        run: bun run preview:ci > /tmp/atelier-preview.log 2>&1 &

      - name: Wait for preview server
        run: |
          for i in {1..30}; do
            if curl -s http://127.0.0.1:4173/closet-v3/ > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/atelier-preview.log
          exit 1

      - name: Capture visual smoke screenshots
        run: bun run ci:screenshots

      - name: Upload screenshot artifact
        id: upload_screenshots
        uses: actions/upload-artifact@v6
        with:
          name: visual-smoke-screenshots
          path: artifacts/screenshots
          if-no-files-found: error

      - name: Add run summary
        run: |
          cat <<'EOF' >> "$GITHUB_STEP_SUMMARY"
          ## Visual smoke screenshots

          Production preview screenshots were captured for:

          - Home dashboard (desktop)
          - Wardrobe catalog (desktop)
          - Register item (desktop)
          - Lookbook maker (desktop)
          - Settings with mobile sheet controls

          Download the `visual-smoke-screenshots` artifact from this run to inspect the PNGs.
          EOF

      - name: Comment on pull request
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const artifactUrl = '${{ steps.upload_screenshots.outputs.artifact-url }}';
            const body = [
              '## Visual smoke screenshots',
              '',
              'This build produced fresh production-preview screenshots for the main product routes.',
              '',
              '- Home dashboard (desktop)',
              '- Wardrobe catalog (desktop)',
              '- Register item (desktop)',
              '- Lookbook maker (desktop)',
              '- Settings with mobile sheet controls',
              '',
              artifactUrl
                ? `Artifact: [visual-smoke-screenshots](${artifactUrl})`
                : 'Artifact: see the workflow artifacts for `visual-smoke-screenshots`.',
              '',
              'Open the artifact to inspect the PNG files generated during CI.'
            ].join('\n');

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const marker = '<!-- atelier-visual-smoke -->';
            const fullBody = `${marker}\n${body}`;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number
            });

            const existing = comments.find((comment) => comment.user?.type === 'Bot' && comment.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body: fullBody
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body: fullBody
              });
            }
